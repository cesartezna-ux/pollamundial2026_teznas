/* --- Storage --- */
const CACHE={};
async function cloudCall(data){
  if(!SCRIPT_URL||SCRIPT_URL.includes("AQUÍ")) return null;
  try{const r=await fetch(SCRIPT_URL,{method:"POST",mode:"cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data)});return await r.json();}
  catch(e){console.error("cloudCall error",e);return null;}
}
async function sGet(k,sh){if(!sh)return localStorage.getItem("p:"+k);return CACHE[k]??null;}
async function sSet(k,v,sh){
  if(!sh){localStorage.setItem("p:"+k,v);return true;}
  CACHE[k]=v;
  const r=await cloudCall({action:"set",key:k,value:v});
  return r&&r.status==="success";
}
async function getJSON(k,sh){const v=await sGet(k,sh);if(v==null)return null;try{return JSON.parse(v);}catch(e){return null;}}
async function setJSON(k,o,sh){return sSet(k,JSON.stringify(o),sh);}
async function fetchAllShared(){
  const r=await cloudCall({action:"getAll"});
  if(r){for(const k in r)CACHE[k]=r[k];return true;}
  return false;
}

  const cm=S.custom.map(c=>({id:c.id,g:c.g||"ELIM",home:c.home,away:c.away,kick:c.kick,custom:true}));

function outcome(h,a){h=+h;a=+a;if(h>a)return"1";if(h<a)return"2";return"X";}
function ptsFor(p,r){

  if(outcome(p.h,p.a)===outcome(r.h,r.a))s+=1;

}

function cd(diff){
  if(diff<=0)return null;

function paintMyStats(){
  const el=document.getElementById("mystats");if(!el)return;

function matchCardHtml(m){
  const locked=S.now>=m.kick;
  const p=S.predsMe[m.id]||{};
  const res=S.results[m.id];
  const colo=COLO(m);
  const ph=(p.h!=null?p.h:""),pa=(p.a!=null?p.a:"");
  const rh=res?res.h:"–",ra=res?res.a:"–";
  const homeWin=res&&+res.h>+res.a,awayWin=res&&+res.a>+res.h;
  const predBox=(side,val)=>locked
    ?`<div class="box ro">${val!==""?val:"–"}</div>`
    :`<input class="box" id="${side}_${m.id}" type="number" inputmode="numeric" min="0" max="49" placeholder="–" value="${val}">`;
  return`<div class="match ${colo?"col":""}" id="card_${m.id}">
    <div class="mtop">
      <span class="grp ${colo?"colrib":""}">${colo?"¡Juega Colombia! 🇨🇴":"Grupo "+m.g}</span>

    </div>

    <div class="team"><span class="fl">${flag(m.home)}</span><span class="nm ${homeWin?"win":""}">${escapeHtml(m.home)}</span>${predBox("h",ph)}<div class="box real">${rh}</div></div>
    <div class="divider"></div>
    <div class="team"><span class="fl">${flag(m.away)}</span><span class="nm ${awayWin?"win":""}">${escapeHtml(m.away)}</span>${predBox("a",pa)}<div class="box real">${ra}</div></div>
    <div class="mfoot" id="foot_${m.id}"></div>
  </div>`;
}

function renderPartidos(c){
  const ms=allMatches();
  let html="",lastDay=null;
  for(const m of ms){
    const dk=dayKey(m.kick);
    if(dk!==lastDay){if(lastDay!==null)html+="</div>";html+=`<div class="daygroup"><div class="dayhead"><span class="d">${cap(FD.format(m.kick))}</span><span class="rule"></span></div>`;lastDay=dk;}
    html+=matchCardHtml(m);
  }
  if(lastDay!==null)html+="</div>";
  html+=`<div class="rules"><div><b>Cómo se ganan los puntos</b></div>
    <div style="margin-top:8px"><span class="pill">+1</span> si aciertas quién gana (o el empate).</div>
    <div><span class="pill">+2</span> extra si además clavas el marcador exacto. <span style="color:var(--muted)">(máximo <b style="color:var(--gold)">3</b> por partido)</span></div>
    <div style="margin-top:8px">Cada partido se cierra a su hora de inicio.</div></div>`;
  c.innerHTML=html;

    matchEls[m.id]={hi,ai,cd:document.getElementById("cd_"+m.id),foot:document.getElementById("foot_"+m.id)};
    const onIn=()=>handleInput(m.id);
    if(hi)hi.oninput=onIn;if(ai)ai.oninput=onIn;
    paintFoot(m);
  }
}

function clampVal(v){if(v==="")return"";let n=parseInt(v,10);if(isNaN(n))return"";if(n<0)n=0;if(n>49)n=49;return n;}
function handleInput(id){
  const e=matchEls[id];if(!e)return;
  let h=clampVal(e.hi.value),a=clampVal(e.ai.value);
  if(e.hi.value!==String(h))e.hi.value=h;
  if(e.ai.value!==String(a))e.ai.value=a;
  if(h===""||a==="")delete S.predsMe[id];else S.predsMe[id]={h,a};
  S.dirty.add(id);updateSaveBar();
}

function paintFoot(m){
  const e=matchEls[m.id];if(!e||!e.foot)return;
  const locked=S.now>=m.kick,res=S.results[m.id],p=S.predsMe[m.id];
  let left="",right="";
  if(res){
    if(p){const pp=ptsFor(p,res);const cls=pp===3?"p3":(pp===1?"p1":"p0");const txt=pp===3?"¡Marcador exacto!":(pp===1?"Acertaste el ganador":"No acertaste");left=`<span class="status">${txt}</span>`;right=`<span class="pts ${cls}">+${pp} pts</span>`;}
    else{left=`<span class="status">No pronosticaste</span>`;right=`<span class="pts p0">0 pts</span>`;}
  }else if(locked){
    left=`<span class="status locked">🔒 Cerrado</span>`;
    right=p?`<span class="status">Tu pronóstico: <b style="color:var(--line)">${p.h}–${p.a}</b></span>`:`<span class="status">Sin pronóstico</span>`;
  }else{
    left=`<span class="status">Abierto · escribe tu pronóstico</span>`;
    right=p?`<span class="status" style="color:var(--mint);font-weight:700">✓ ${p.h}–${p.a} guardado</span>`:`<span class="status" style="color:var(--flare)">⚠️ sin pronóstico</span>`;
  }
  e.foot.innerHTML=`<span>${left}</span><span>${right}</span>`;
}

function updateSaveBar(){
  const bar=document.getElementById("savebar"),inner=bar.firstElementChild;
  if(S.view==="partidos"&&S.dirty.size>0){
    inner.innerHTML=`<button class="btn" id="saveBtn">Guardar mis pronósticos (${S.dirty.size})</button>`;
    document.getElementById("saveBtn").onclick=savePreds;bar.style.display="block";
  }else if(S.view==="resultados"&&S.resDirty&&S.resDirty.size>0){
    inner.innerHTML=`<button class="btn" id="saveResBtn">Guardar resultados (${S.resDirty.size})</button>`;
    document.getElementById("saveResBtn").onclick=saveResultsBatch;bar.style.display="block";
  }else bar.style.display="none";
}

async function savePreds(){
  const byId={};allMatches().forEach(m=>byId[m.id]=m);
  let dropped=0;
  for(const id of[...S.dirty]){const m=byId[id];if(m&&S.now>=m.kick){dropped++;S.dirty.delete(id);}}
  toast("Guardando en la nube...");
  const ok=await setJSON("preds_"+S.me.id,S.predsMe,true);
  await joinRoster();
  S.allPreds[S.me.id]=Object.assign({},S.predsMe);
  S.dirty.clear();updateSaveBar();allMatches().forEach(m=>paintFoot(m));paintMyStats();
  if(!ok)toast("❌ No se pudo guardar. Revisa tu conexión.",true,5000);
  else if(dropped>0)toast(`✅ Guardado. ${dropped} ya cerrado(s).`,false,5000);
  else toast(`✅ ¡${Object.keys(S.predsMe).length} pronósticos guardados!`,false,5000);
}

/* --- Ranking --- */
function buildBoard(){
  const ms=allMatches();
  const finished=ms.filter(m=>S.results[m.id]);
  const board=S.roster.map(pl=>{
    const preds=S.allPreds[pl.id]||{};
    let pts=0,ex=0,ac=0,played=0;
    for(const m of finished){const p=preds[m.id],r=S.results[m.id];if(p){played++;const s=ptsFor(p,r);pts+=s;if(s===3)ex++;if(s>=1)ac++;}}
    return{...pl,pts,ex,ac,played};
  });
  board.sort((a,b)=>b.pts-a.pts||b.ex-a.ex||b.ac-a.ac||a.name.localeCompare(b.name));
  return{board,finished:finished.length,total:ms.length};
}
function renderRanking(c){
  const{board,finished,total}=buildBoard();
  if(board.length===0){c.innerHTML=`<div class="empty"><span class="big">🏟️</span>Todavía nadie se ha unido.</div>`;return;}
  let rows="";
  board.forEach((p,i)=>{
    const rank=i+1,mine=S.me&&p.id===S.me.id;
    const topcls=rank===1?"top1":rank===2?"top2":rank===3?"top3":"";
    const medal=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"";
    rows+=`<div class="row ${topcls} ${mine?"me":""}">
      <div class="rank">${rank}</div>
      <div class="who"><div class="nm"><span class="ico">${p.ico||"⚽"}</span>${escapeHtml(p.name)}${mine?' <span style="color:var(--mint);font-size:11px;font-weight:600">· tú</span>':""} ${medal}</div>
      <div class="sub">${p.ex} exacto(s) · ${p.ac} acierto(s) · ${p.played} jugados</div></div>
      <div class="score"><div class="pp">${p.pts}</div><div class="lbl">pts</div></div>
    </div>`;
  });
  c.innerHTML=`<div class="lead"><div class="leadhead"><span class="t">Ranking Familiar</span><span class="meta">Resultados: ${finished}/${total}</span></div>${rows}</div>`;
}

function renderResultados(c){
  S.resDirty=S.resDirty||new Set();S.resWork=Object.assign({},S.results);
  const ms=allMatches().slice().sort((a,b)=>b.kick-a.kick);
  let html=`<div class="rules" style="margin-top:8px;margin-bottom:14px">Carga el <b>resultado oficial</b> o agrega nuevos cruces.</div>`;

  html+=`<div class="addbox"><div class="ttl">➕ Agregar partido eliminatorio</div><div class="addgrid">

    <button class="smallbtn full" id="cm_add">Agregar partido</button>
  </div></div>`;
  for(const m of ms){
    const r=S.resWork[m.id]||{},locked=S.now>=m.kick;
    html+=`<div class="match" style="border-radius:14px">
      <div class="mtop"><span class="grp">${m.custom?"🏆 "+m.g:"Grupo "+m.g}</span>
      <span class="when">${cap(FD.format(m.kick))} · ${FT.format(m.kick)} ${locked?"":"<span style='color:var(--flare)'>· aún no inicia</span>"}</span></div>
      <div class="team"><span class="fl">${flag(m.home)}</span><span class="nm">${escapeHtml(m.home)}</span><input class="box" id="rh_${m.id}" type="number" inputmode="numeric" min="0" max="49" placeholder="–" value="${r.h!=null?r.h:""}"></div>
      <div class="divider"></div>
      <div class="team"><span class="fl">${flag(m.away)}</span><span class="nm">${escapeHtml(m.away)}</span><input class="box" id="ra_${m.id}" type="number" inputmode="numeric" min="0" max="49" placeholder="–" value="${r.a!=null?r.a:""}"></div>
    </div>`;
  }
  c.innerHTML=html;
  document.getElementById("cm_add").onclick=addCustomMatch;
  for(const m of ms){

      if(h===""||a==="")delete S.resWork[m.id];else S.resWork[m.id]={h,a};
      S.resDirty.add(m.id);updateSaveBar();
    };
    rh.oninput=on;ra.oninput=on;
  }
  updateSaveBar();
}
async function saveResultsBatch(){
  S.results=Object.assign({},S.resWork);
  Object.keys(S.results).forEach(k=>{const r=S.results[k];if(!r||r.h==null||r.a==null)delete S.results[k];});
  toast("Actualizando marcadores...");
  const ok=await setJSON("results",S.results,true);
  S.resDirty.clear();updateSaveBar();
  toast(ok?"Resultados guardados ✓":"Error al guardar",!ok);
  if(S.view==="ranking")renderRanking(document.getElementById("content"));
}
async function addCustomMatch(){
  const home=document.getElementById("cm_home").value.trim();
  const away=document.getElementById("cm_away").value.trim();
  const d=document.getElementById("cm_date").value,t=document.getElementById("cm_time").value;
  const fase=document.getElementById("cm_fase").value.trim()||"Eliminatoria";
  if(!home||!away||!d||!t){toast("Completa equipos, fecha y hora.",true);return;}
  const kick=new Date(`${d}T${t}:00-05:00`).getTime();
  if(isNaN(kick)){toast("Fecha u hora inválida.",true);return;}
  const id="c_"+Math.random().toString(36).slice(2,8);
  S.custom.push({id,g:fase,home,away,kick});
  await setJSON("custom",S.custom,true);
  toast("Partido agregado ✓");
  renderResultados(document.getElementById("content"));
}

      const err=document.getElementById("reg_err");
      if(!name){inp.focus();inp.style.borderColor="var(--flare)";err.textContent="Escribe tu nombre.";return;}
      if(pin1.length<4){err.textContent="El PIN debe tener 4 dígitos.";return;}
      if(pin1!==pin2){err.textContent="Los PINes no coinciden.";return;}
      if(roster.find(p=>p.name.toLowerCase()===name.toLowerCase())){err.textContent="Ya existe ese nombre. ¿Eres tú? Selecciónate de la lista.";return;}
      const newId="p_"+Math.random().toString(36).slice(2,9);
      S.me={id:newId,name,ico:pendingIco};
      await setJSON("me",S.me,false);
      await setJSON("pin_"+newId,_hashPin(pin1),true);
      await joinRoster();
      ov.remove();renderShell();renderView();
      toast(`¡Bienvenido ${name}! Guarda tu PIN.`,false,5000);
    };
  }

  async function _loginPlayer(player,pin,isFirstTime){
    S.me={id:player.id,name:player.name,ico:player.ico};
    await setJSON("me",S.me,false);
    if(isFirstTime){
      await setJSON("pin_"+player.id,_hashPin(pin),true);
      toast(`¡Hola ${player.name}! PIN creado. Recuérdalo.`,false,5000);
    }
    await _migrarPronosticos(player.id);
    S.predsMe=(await getJSON("preds_"+player.id,true))||{};
    await joinRoster();
    ov.remove();renderShell();renderView();
    if(!isFirstTime)toast(`¡Bienvenido de vuelta, ${player.name}!`,false,3000);
  }

  if(isChange&&S.me){
    const player=roster.find(p=>p.id===S.me.id);
    if(player){renderPinScreen(player);return;}
  }
  renderSelectScreen();
}

async function joinRoster(){
  await cloudCall({action:"joinRoster",player:S.me});
  if(!S.roster.some(p=>p.id===S.me.id))S.roster.push(S.me);
}

async function _migrarPronosticos(targetId){
  try{
    const existing=await getJSON("preds_"+targetId,true);
    if(existing&&Object.keys(existing).length>0)return;
    const roster=(await getJSON("roster",true))||[];
    const myName=S.me.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const oldEntry=roster.find(p=>p.id!==targetId&&p.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")===myName&&p.id.startsWith("p_"));
    if(oldEntry){
      const oldPreds=await getJSON("preds_"+oldEntry.id,true);
      if(oldPreds&&Object.keys(oldPreds).length>0)await setJSON("preds_"+targetId,oldPreds,true);
    }
  }catch(e){console.error("Error migrando:",e);}
}

async function showPinReset(){
  const roster=(await getJSON("roster",true))||[];
  const old=document.getElementById("ovl");if(old)old.remove();
  const ov=document.createElement("div");ov.className="overlay";ov.id="ovl";
  ov.innerHTML=`<div class="card">
    <div class="kicker" style="color:var(--gold)">Modo Organizador</div>
    <h2>Resetear PIN</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 14px">Selecciona el jugador cuyo PIN quieres resetear.</p>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;margin-bottom:16px">
      ${roster.map(p=>`<button class="pr-row" data-id="${p.id}" style="display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--faint);border-radius:12px;padding:11px 14px;cursor:pointer;color:var(--line);font:inherit;text-align:left">
        <span style="font-size:20px">${p.ico||"⚽"}</span><span style="font-weight:700;flex:1">${escapeHtml(p.name)}</span><span style="color:var(--flare);font-size:12px">Resetear →</span></button>`).join("")}
    </div>
    <button class="btn ghost" id="cancelPR">Cancelar</button>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById("cancelPR").onclick=()=>ov.remove();
  ov.querySelectorAll(".pr-row").forEach(btn=>{
    btn.onclick=async()=>{
      const pl=roster.find(p=>p.id===btn.dataset.id);if(!pl)return;
      await setJSON("pin_"+pl.id,null,true);
      ov.remove();toast(`PIN de ${pl.name} reseteado.`,false,5000);
    };
  });
}

/* --- Tick --- */
function tick(){
  S.now=Date.now();
  if(S.view!=="partidos")return;
  for(const m of allMatches()){
    const e=matchEls[m.id];if(!e)continue;
    const diff=m.kick-S.now,info=cd(diff);
    if(e.cd){if(info){e.cd.textContent="Cierra en "+info.t;e.cd.className="cd"+(info.soon?" soon":"");}else{e.cd.textContent="Cerrado";e.cd.className="cd closed";}}
    const locked=S.now>=m.kick;
    if(e.hi&&e.hi.disabled!==locked){e.hi.disabled=locked;e.ai.disabled=locked;paintFoot(m);}
  }
}
setInterval(tick,1000);

/* --- Sync --- */
async function refreshShared(){
  try{
    const ok=await fetchAllShared();if(!ok)return;
    const roster=(await getJSON("roster",true))||S.roster;
    const results=(await getJSON("results",true))||{};
    const custom=(await getJSON("custom",true))||[];
    S.roster=roster;S.custom=custom;
    const resChanged=JSON.stringify(results)!==JSON.stringify(S.results);
    S.results=results;
    const preds={};
    for(const pl of roster)preds[pl.id]=(await getJSON("preds_"+pl.id,true))||{};
    S.allPreds=preds;
    if(S.me){
      const fresh=(await getJSON("preds_"+S.me.id,true))||{};
      for(const id of S.dirty)if(S.predsMe[id]!=null)fresh[id]=S.predsMe[id];
      const changed=JSON.stringify(fresh)!==JSON.stringify(S.predsMe);
      S.predsMe=fresh;S.allPreds[S.me.id]=Object.assign({},S.predsMe);
      if(S.view==="ranking")renderRanking(document.getElementById("content"));
      else if(S.view==="partidos"&&(resChanged||changed)&&S.dirty.size===0)renderPartidos(document.getElementById("content"));
      else if(S.view==="partidos"&&resChanged)allMatches().forEach(m=>paintFoot(m));
    }else{
      if(S.view==="ranking")renderRanking(document.getElementById("content"));
      else if(S.view==="partidos"&&resChanged)allMatches().forEach(m=>paintFoot(m));
    }
    paintMyStats();
  }catch(e){console.error(e);}
}
setInterval(refreshShared,25000);
window.addEventListener("focus",refreshShared);

/* --- Boot --- */
(async function boot(){
  try{
    S.allPreds={};
    S.me=await getJSON("me",false);
    S.organizer=(await getJSON("organizer",false))||false;
    await fetchAllShared();
    S.results=(await getJSON("results",true))||{};
    S.custom=(await getJSON("custom",true))||[];
    S.roster=(await getJSON("roster",true))||[];
    if(S.me){S.predsMe=(await getJSON("preds_"+S.me.id,true))||{};await joinRoster();}
    for(const pl of S.roster)S.allPreds[pl.id]=(await getJSON("preds_"+pl.id,true))||{};
    if(S.me)S.allPreds[S.me.id]=Object.assign({},S.predsMe);
    renderShell();renderView();refreshShared();
    if(!S.me)showOnboarding(false);
  }catch(e){console.error("Boot error:",e);renderShell();renderView();}
})();

function forzarSincronizacionAPI(){
  const btn=document.getElementById("api_sync_btn");
  if(btn){btn.innerText="⏳ Conectando...";btn.disabled=true;btn.style.backgroundColor="#83a294";}
  fetchAllShared().then(()=>{toast("¡Sincronizado! ⚽");setTimeout(()=>location.reload(),800);}).catch(()=>{toast("Sincronizando...");setTimeout(()=>location.reload(),800);});
}
</script>
