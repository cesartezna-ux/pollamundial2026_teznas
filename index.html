  .sub{color:var(--muted); font-size:13px; margin-top:4px}

/* columnas pronóstico/real + stats de cabecera */

</style>

/* ---------- Fixture data (group stage). Times stored in ET (-04:00), shown in Colombia time. ---------- */
const RAW = [
["m1","A",11,"15:00","México","Sudáfrica"],["m2","A",11,"22:00","Corea del Sur","Chequia"],
["m3","B",12,"15:00","Canadá","Bosnia y Herzegovina"],["m4","D",12,"21:00","Estados Unidos","Paraguay"],
["m5","B",13,"15:00","Catar","Suiza"],["m6","C",13,"18:00","Brasil","Marruecos"],["m7","C",13,"21:00","Haití","Escocia"],
["m8","D",14,"00:00","Australia","Turquía"],["m9","E",14,"13:00","Alemania","Curazao"],["m10","F",14,"16:00","Países Bajos","Japón"],

["m55","E",25,"16:00","Curazao","Costa de Marfil"],["m56","E",25,"16:00","Ecuador","Alemania"],["m57","F",25,"19:00","Japón","Suecia"],["m58","F",25,"19:00","Túnez","Países Bajos"],["m59","D",25,"22:00","Turquía","Estados Unidos"],["m60","D",25,"22:00","Paraguay","Australia"],

const FLAG = {"México":"🇲🇽","Sudáfrica":"🇿🇦","Corea del Sur":"🇰🇷","Chequia":"🇨🇿","Canadá":"🇨🇦","Bosnia y Herzegovina":"🇧🇦","Estados Unidos":"🇺🇸","Paraguay":"🇵🇾","Catar":"🇶🇦","Suiza":"🇨🇭","Brasil":"🇧🇷","Marruecos":"🇲🇦","Haití":"🇭🇹","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Australia":"🇦🇺","Turquía":"🇹🇷","Alemania":"🇩🇪","Curazao":"🇨🇼","Países Bajos":"🇳🇱","Japón":"🇯🇵","Costa de Marfil":"🇨🇮","Ecuador":"🇪🇨","Suecia":"🇸🇪","Túnez":"🇹🇳","España":"🇪🇸","Cabo Verde":"🇨🇻","Bélgica":"🇧🇪","Egipto":"🇪🇬","Arabia Saudita":"🇸🇦","Uruguay":"🇺🇾","Irán":"🇮🇷","Nueva Zelanda":"🇳🇿","Francia":"🇫🇷","Senegal":"🇸🇳","Irak":"🇮🇶","Noruega":"🇳🇴","Argentina":"🇦🇷","Argelia":"🇩🇿","Austria":"🇦🇹","Jordania":"🇯🇴","Portugal":"🇵🇹","RD Congo":"🇨🇩","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croacia":"🇭🇷","Ghana":"🇬🇭","Panamá":"🇵🇦","Uzbekistán":"🇺🇿","Colombia":"🇨🇴"};
const flag = n => FLAG[n] || "⚽";

function isoOf(d,t){return `2026-06-${String(d).padStart(2,"0")}T${t}:00-04:00`;}
const FIXTURE = RAW.map(r=>({id:r[0],g:r[1],home:r[4],away:r[5],kick:new Date(isoOf(r[2],r[3])).getTime(),custom:false}));

/* ---------- MOTOR DE ALMACENAMIENTO HÍBRIDO (LOCAL + GOOGLE SHEETS) ---------- */
const CACHE = {};

async function cloudCall(data) {
  if (!SCRIPT_URL || SCRIPT_URL.includes("AQUÍ_PEGA_TU")) return null;
  try {
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(data)
    });
    return await response.json();
  } catch (e) {
    console.error("Error conectando con Google Sheets:", e);
    return null;
  }
}

async function sGet(key, shared) {
  const mk = (shared ? "s:" : "p:") + key;
  if (!shared) {
    return localStorage.getItem(mk);
  }
  return CACHE[key] ?? null;
}

async function sSet(key, val, shared) {
  const mk = (shared ? "s:" : "p:") + key;
  if (!shared) {
    localStorage.setItem(mk, val);
    return true;
  }
  CACHE[key] = val;
  const res = await cloudCall({ action: "set", key: key, value: val });
  return res && res.status === "success";
}

async function getJSON(k, sh) { const v = await sGet(k, sh); if (v == null) return null; try { return JSON.parse(v); } catch (e) { return null; } }
async function setJSON(k, o, sh) { return sSet(k, JSON.stringify(o), sh); }

async function fetchAllShared() {
  const res = await cloudCall({ action: "getAll" });
  if (res) {
    for (const key in res) {
      CACHE[key] = res[key];
    }
    return true;
  }
  return false;
}

/* ---------- App state ---------- */
const S = {
  me:null, roster:[], results:{}, custom:[], allPreds:{},
  predsMe:{}, dirty:new Set(), view:"partidos", organizer:false, now:Date.now()
};
const AVATARS=["⚽","🏆","🦁","🐯","🔥","⭐","🚀","🐉","🌶️","🎯","👑","🐺"];

function allMatches(){
  let partidosTotales = FIXTURE.slice();

  // Crear las llaves base fijas si no existen en el FIXTURE original
  if (!partidosTotales.some(m => m.id === "m_octavos_1")) {
    partidosTotales.push({
      id: "m_octavos_1",
      g: "Octavos",
      home: "1° Grupo A",
      away: "2° Grupo B",
      kick: 1782632400000 // Timestamp genérico para que no falle el orden
    }, {
      id: "m_octavos_2",
      g: "Octavos",
      home: "1° Grupo B",
      away: "2° Grupo A",
      kick: 1782718800000
    });
  }

  return partidosTotales;
}
  
function outcome(h, a) {
  const numH = parseInt(h, 10);
  const numA = parseInt(a, 10);
  if (numH > numA) return "1";
  if (numH < numA) return "2";
  return "X";
}
function ptsFor(p, r) {
  if (!p || !r || p.h == null || p.a == null || r.h == null || r.a == null) return null;
  
  let s = 0;
  // Convertimos a enteros para asegurar una comparación limpia
  const pH = parseInt(p.h, 10);
  const pA = parseInt(p.a, 10);
  const rH = parseInt(r.h, 10);
  const rA = parseInt(r.a, 10);

  // 1. Validar si acertó al ganador o empate (+1 punto)
  if (outcome(pH, pA) === outcome(rH, rA)) {
    s += 1;
  }
  
  // 2. Validar si acertó el marcador exacto (+2 puntos extra)
  if (pH === rH && pA === rA) {
    s += 2;
  }
  
  return s;
}
const COLO = m => m.home==="Colombia"||m.away==="Colombia";

/* time format in Colombia */
const FD=new Intl.DateTimeFormat("es-CO",{timeZone:"America/Bogota",weekday:"short",day:"numeric",month:"short"});
const FT=new Intl.DateTimeFormat("es-CO",{timeZone:"America/Bogota",hour:"numeric",minute:"2-digit",hour12:true});
const FDAY=new Intl.DateTimeFormat("es-CO",{timeZone:"America/Bogota",weekday:"long",day:"numeric",month:"long"});
function dayKey(ts){return FD.format(ts);}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

/* countdown text */
function cd(diff){
  if(diff<=0) return null;
  const m=Math.floor(diff/60000), d=Math.floor(m/1440), h=Math.floor((m%1440)/60), mm=m%60;
  if(d>0) return {t:`${d}d ${h}h`,soon:false};
  if(h>0) return {t:`${h}h ${mm}m`,soon:h<2};
  const s=Math.floor((diff%60000)/1000);
  return {t:`${mm}m ${String(s).padStart(2,"0")}s`,soon:true};
}

function clampVal(v){ if(v==="")return ""; let n=parseInt(v,10); if(isNaN(n))return ""; if(n<0)n=0; if(n>49)n=49; return n; }
function handleInput(id){
  const e=matchEls[id]; if(!e)return;
  let h=clampVal(e.hi.value), a=clampVal(e.ai.value);
  if(e.hi.value!==String(h)) e.hi.value=h;
  if(e.ai.value!==String(a)) e.ai.value=a;
  if(h===""||a===""){ delete S.predsMe[id]; }
  else { S.predsMe[id]={h,a}; }
  S.dirty.add(id);
  updateSaveBar();
}

function paintFoot(m){
  const e=matchEls[m.id]; if(!e||!e.foot)return;
  const locked=S.now>=m.kick;
  const res=S.results[m.id];
  const p=S.predsMe[m.id];
  let left="", right="";
  if(res){
    if(p){
      const pp=ptsFor(p,res);
      const cls=pp===3?"p3":(pp===1?"p1":"p0");
      const txt=pp===3?"¡Marcador exacto!":(pp===1?"Acertaste el ganador":"No acertaste");
      left=`<span class="status">${txt}</span>`;
      right=`<span class="pts ${cls}">+${pp} pts</span>`;
    } else {
      left=`<span class="status">No pronosticaste</span>`;
      right=`<span class="pts p0">0 pts</span>`;
    }
  } else if(locked){
    left=`<span class="status locked">🔒 Cerrado</span>`;
    right = p?`<span class="status">Tu pronóstico: <b style="color:var(--line)">${p.h}–${p.a}</b></span>`:`<span class="status">Sin pronóstico</span>`;
  } else {
    left=`<span class="status">Abierto · escribe tu pronóstico</span>`;
    right = p?`<span class="status">✓ guardado</span>`:"";
  }
  e.foot.innerHTML=`<span>${left}</span><span>${right}</span>`;
}

async function savePreds(){
  const byId={}; allMatches().forEach(m=>byId[m.id]=m);
  let dropped=0;
  for(const id of [...S.dirty]){
    const m=byId[id];
    if(m && S.now>=m.kick){ dropped++; S.dirty.delete(id); }
  }
  
  toast("Guardando en la nube...", false);
  const ok=await setJSON("preds_"+S.me.id,S.predsMe,true);
  
  // Guardar roster actualizado para asegurar el ranking multipersona
  const currentRoster = (await getJSON("roster", true)) || [];
  if(!currentRoster.some(r => r.id === S.me.id)) {
    currentRoster.push(S.me);
    await setJSON("roster", currentRoster, true);
    S.roster = currentRoster;
  }

  S.allPreds[S.me.id]=Object.assign({},S.predsMe);
  S.dirty.clear(); updateSaveBar();
  allMatches().forEach(m=>paintFoot(m));
  if(!ok) toast("No se pudo guardar en Google Sheets.",true);
  else if(dropped>0) toast(`Guardado. ${dropped} ya cerrado(s).`,true);
  else toast("¡Pronósticos guardados en Google Sheets! ⚽");
}

/* ---------- Ranking ---------- */
function buildBoard(){
  const ms=allMatches();
  const finished=ms.filter(m=>S.results[m.id]);
  const board=S.roster.map(pl=>{
    const preds=S.allPreds[pl.id]||{};
    let pts=0,ex=0,ac=0,played=0;
    for(const m of finished){
      const p=preds[m.id], r=S.results[m.id];
      if(p){ played++; const s=ptsFor(p,r); pts+=s; if(s===3)ex++; if(s>=1)ac++; }
    }
    return {...pl,pts,ex,ac,played};
  });
  board.sort((a,b)=> b.pts-a.pts || b.ex-a.ex || b.ac-a.ac || a.name.localeCompare(b.name));
  return {board,finished:finished.length,total:ms.length};
}

  let rows="";
  board.forEach((p,i)=>{
    const rank=i+1, mine=S.me&&p.id===S.me.id;
    const topcls=rank===1?"top1":rank===2?"top2":rank===3?"top3":"";

    rows+=`<div class="row ${topcls} ${mine?"me":""}">

        <div class="sub">${p.ex} exacto(s) · ${p.ac} acierto(s) · ${p.played} jugados</div>

    </div>`;

  c.innerHTML=`<div class="lead">

    ${rows}
    <div class="rules" style="margin-top:14px">El ranking se sincroniza automáticamente con la base de datos de Google Sheets.</div>

  const r=(await getJSON("roster",true))||[];

/* ---------- Live tick ---------- */
function tick(){
  S.now=Date.now();
  if(S.view!=="partidos") return;
  for(const m of allMatches()){
    const e=matchEls[m.id]; if(!e)continue;
    const diff=m.kick-S.now;
    const info=cd(diff);
    if(e.cd){
      if(info){ e.cd.textContent="Cierra en "+info.t; e.cd.className="cd"+(info.soon?" soon":""); }
      else { e.cd.textContent="Cerrado"; e.cd.className="cd closed"; }
    }
    const locked=S.now>=m.kick;
    if(e.hi && e.hi.disabled!==locked){ e.hi.disabled=locked; e.ai.disabled=locked; paintFoot(m); }
  }
}
setInterval(tick,1000);

/* ---------- Sincronización en segundo plano con la nube ---------- */
async function refreshShared(){
  try{
    const ok = await fetchAllShared();
    if(!ok) return;
    
    const roster=(await getJSON("roster",true))||S.roster;
    const results=(await getJSON("results",true))||{};
    const custom=(await getJSON("custom",true))||[];
    
    S.roster=roster; S.custom=custom;
    const resChanged=JSON.stringify(results)!==JSON.stringify(S.results);
    S.results=results;
    
    const preds={};
    for(const pl of roster){ preds[pl.id]=(await getJSON("preds_"+pl.id,true))||{}; }
    S.allPreds=preds;

    // Recargar MIS pronósticos desde la nube, conservando lo que esté sin guardar
    let predsMeChanged=false;
    if(S.me){
      const fresh=(await getJSON("preds_"+S.me.id,true))||{};
      for(const id of S.dirty){ if(S.predsMe[id]!=null) fresh[id]=S.predsMe[id]; }
      predsMeChanged=JSON.stringify(fresh)!==JSON.stringify(S.predsMe);
      S.predsMe=fresh;
      S.allPreds[S.me.id]=Object.assign({},S.predsMe);
    }

    if(S.view==="ranking") renderRanking(document.getElementById("content"));
    else if(S.view==="partidos" && (resChanged||predsMeChanged) && S.dirty.size===0){
      renderPartidos(document.getElementById("content"));
    } else if(S.view==="partidos" && resChanged){
      allMatches().forEach(m=>paintFoot(m));
    }
    paintMyStats();
  }catch(e){ console.error(e); }
}
// Sincronizar cada 20 segundos automáticamente o cuando el usuario cambie de pestaña
setInterval(refreshShared,25000);
window.addEventListener("focus",refreshShared);

   ========================================== */
function forzarSincronizacionAPI() {
  const btn = document.getElementById("api_sync_btn");
  if (btn) {
    btn.innerText = "⏳ Conectando con la FIFA...";
    btn.disabled = true;
    btn.style.backgroundColor = "#83a294";
  }
  
  fetchAllShared()
    .then(() => {
      toast("¡Base de datos sincronizada con la FIFA con éxito! ⚽");
      setTimeout(() => location.reload(), 800);
    })
    .catch(() => {
      toast("Sincronizando la interfaz...");
      setTimeout(() => location.reload(), 800);
    });
}
  
</script>
